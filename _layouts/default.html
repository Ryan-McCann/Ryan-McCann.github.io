<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}

{% seo %}

    <style>
      #downloads{
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 18px;
      }
      
      #downloads .btn{
        background: linear-gradient(to top,rgb(0, 0, 0) 20%, rgb(181, 232, 83) 95%);
      }
      
      #downloads .btn:hover{
        background: linear-gradient(to bottom,rgb(0, 0, 0) 20%, rgb(181, 232, 83) 95%);
      }
    
      #downloads .contact-info{
        margin-left: auto;
      }

      #main-content{
        margin: 0 auto;
        text-align: center;
    </style>
  </head>

  <body>

    <header>
      <div class="container">
        <a id="a-title" href="{{ '/' | relative_url }}">
          <h1>{{ site.title | default: site.github.repository_name }}</h1>
        </a>
        <h2>{{ site.description | default: site.github.project_tagline }}</h2>

        <section id="downloads">
          {% if site.show_downloads %}
            <a href="{{ site.github.zip_url }}" class="btn">Download as .zip</a>
            <a href="{{ site.github.tar_url }}" class="btn">Download as .tar.gz</a>
          {% endif %}
          <a href="https://www.github.com/Ryan-McCann" class="btn btn-github"><span class="icon"></span>My repositories</a>
          <a href="/resume.pdf" class="btn">Resume</a>
          <a href="mailto:mccann.ryan.92@gmail.com" class="btn contact-info">Contact Me</a>
        </section>
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        {{ content }}
      </section>
    </div>
  </body>
</html>
